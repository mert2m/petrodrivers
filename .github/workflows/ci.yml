name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:ci

  db:
    runs-on: ubuntu-latest
    services:
      postgis:
        image: imresamu/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: petrodrivers
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d petrodrivers"
          --health-interval 5s --health-timeout 5s --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply shims + migrations (twice — idempotency)
        env:
          PGPASSWORD: postgres
        run: |
          PSQL=(psql -v ON_ERROR_STOP=1 -h localhost -p 5432 -U postgres -d petrodrivers)
          "${PSQL[@]}" -f scripts/db/local-verify-shims.sql
          for f in supabase/migrations/0*.sql; do echo "apply $f"; "${PSQL[@]}" -f "$f"; done
          for f in supabase/migrations/0*.sql; do "${PSQL[@]}" -f "$f" >/dev/null; done
          "${PSQL[@]}" -c "select count(*) as policies from pg_policies where schemaname in ('public','storage');"
